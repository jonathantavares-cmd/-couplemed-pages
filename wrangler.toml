name = "couplemed"
main = "worker.js"
compatibility_date = "2024-09-23"

[assets]
directory = "./public"
binding = "ASSETS"

# ---- Notebook R2 (imagens dos cadernos) ----
[[r2_buckets]]
binding = "NB_STORAGE"
bucket_name = "couplemed-notebook"

# ---- Library 3 R2 (PDFs) ----
[[r2_buckets]]
binding = "LIB3_STORAGE"
bucket_name = "couplemed-library3"

# ---- D1: sincronizacao entre aparelhos (v52) ----
[[d1_databases]]
binding = "QBANK_DB"
database_name = "qbank-db"
database_id = "912e823c-6c8f-461e-a91f-4a59a215de1d"

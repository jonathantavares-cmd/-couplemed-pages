name = "couplemed"
main = "worker.js"
compatibility_date = "2024-09-23"

[assets]
directory = "./public"
binding = "ASSETS"

# ---- Notebook R2 (imagens dos cadernos) ----
# ⚠️ IMPORTANTE: crie o bucket "couplemed-notebook" no painel da Cloudflare
# (R2 Object Storage → Create bucket → nome EXATAMENTE couplemed-notebook)
# ANTES de fazer o push. Se o bucket não existir, o deploy do Worker FALHA
# (o site continua no ar na versão anterior, mas a atualização não sobe).
[[r2_buckets]]
binding = "NB_STORAGE"
bucket_name = "couplemed-notebook"

# ---- QBank D1 (backend preparado) ----
# Para ATIVAR o backend do QBank, descomente o bloco abaixo e cole o database_id
# retornado por `npx wrangler d1 create qbank-db`, depois rode:
#   npx wrangler d1 execute qbank-db --file ./schema.sql --remote
# Enquanto estiver comentado, o site funciona 100% em localStorage.
#
# [[d1_databases]]
# binding = "QBANK_DB"
# database_name = "qbank-db"
# database_id = "COLE_O_ID_AQUI"
